<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignBridge · Login</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts Inter + Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b1f2a 0%, #1c3a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            line-height: 1.4;
            color: #e2f0f5;
        }

        /* cool abstract overlays (matching admin dashboard) */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 200, 0.06) 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(100, 255, 220, 0.05) 0%, transparent 45%),
                repeating-linear-gradient(45deg, rgba(64, 224, 208, 0.02) 0px, rgba(64, 224, 208, 0.02) 2px, transparent 2px, transparent 25px);
            pointer-events: none;
            z-index: 0;
        }

        /* floating geometric shapes (cool hand silhouette) */
        body::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            width: 380px;
            height: 380px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.1"><path fill="%2340e0d0" d="M100,30 L120,80 L180,80 L130,115 L150,175 L100,140 L50,175 L70,115 L20,80 L80,80 Z"/></svg>');
            background-size: 300px 300px;
            background-repeat: no-repeat;
            background-position: bottom right;
            filter: drop-shadow(0 0 4px #20b2aa);
            pointer-events: none;
            z-index: 0;
        }

        /* main card – cool glass morphism (matching admin cards) */
        .login-card {
            max-width: 400px;
            width: 100%;
            background: rgba(20, 60, 65, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 2.2rem 2.2rem;
            box-shadow: 
                0 20px 40px -16px rgba(0, 20, 20, 0.8),
                0 8px 16px -8px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(64, 224, 208, 0.3);
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
            border: 1px solid #40e0d060;
        }

        .login-card:hover {
            box-shadow: 0 30px 50px -20px #00181e, 0 6px 12px -6px #000000;
            border-color: #40e0d0a0;
        }

        /* brand – cool teal/mint gradient */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.2rem;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #20b2aa, #40e0d0);
            color: #022028;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 400;
            box-shadow: 0 4px 8px #20b2aa30;
            border: 1px solid #a0f0e8;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #e0fff8, #40e0d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 3px #20b2aa30;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #80f0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
        }

        .greeting {
            font-size: 0.9rem;
            color: #b0e0e0;
            margin-bottom: 1.2rem;
            border-left: 3px solid #40e0d0;
            padding-left: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0 20px 20px 0;
            line-height: 1.4;
            backdrop-filter: blur(2px);
        }

        /* form elements - cool themed */
        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #80e0e0;
            margin-bottom: 0.3rem;
        }

        .input-field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 1rem;
            color: #40e0d0;
            z-index: 1;
            opacity: 0.8;
        }

        .input-field input {
            width: 100%;
            padding: 0.8rem 3rem 0.8rem 3rem;
            border: 1.5px solid rgba(64, 224, 208, 0.4);
            border-radius: 40px;
            font-size: 0.9rem;
            background: rgba(10, 45, 50, 0.7);
            color: #e0f0f0;
            transition: all 0.15s ease;
            font-weight: 400;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .input-field input:focus {
            outline: none;
            border-color: #40e0d0;
            background: rgba(20, 60, 65, 0.8);
            box-shadow: 0 0 0 3px rgba(64, 224, 208, 0.2), inset 0 1px 4px #000000;
        }

        .input-field input::placeholder {
            color: #80b0b0;
            opacity: 0.6;
        }

        /* eye toggle - cool themed */
        .toggle-password {
            position: absolute;
            right: 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            border-radius: 50%;
            color: #40e0d0;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .toggle-password:hover {
            color: #80f0e0;
            transform: scale(1.1);
        }

        /* strength indicator - hidden (matching admin style) */
        .strength-container {
            display: none;
        }

        /* action row */
        .action-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin: 0.8rem 0 1.4rem;
        }

        .forgot a {
            color: #80e0e0;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            border-bottom: 1px dotted #40e0d080;
            transition: border 0.1s;
        }

        .forgot a:hover {
            border-bottom: 1px solid #80f0e0;
            color: #ffffff;
        }

        /* primary button - cool gradient */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #154851, #1d6675);
            border: none;
            padding: 0.85rem;
            border-radius: 40px;
            color: #e0f0f0;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 18px -10px #00181e, 0 1px 2px #40e0d040 inset;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #40e0d080;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #1d6675, #248a9c);
            box-shadow: 0 12px 22px -12px #000000, 0 1px 2px #80f0e060 inset;
            color: white;
            border-color: #80f0e0;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn span {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* register link */
        .register {
            text-align: center;
            margin-top: 1.2rem;
            color: #b0e0e0;
            font-size: 0.85rem;
        }

        .register a {
            color: #80f0e0;
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.3rem;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.15s;
        }

        .register a:hover {
            border-bottom-color: #80f0e0;
            color: #ffffff;
        }

        /* subtle hand accent - cool themed */
        .hand-note {
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #80e0e0;
            font-size: 0.8rem;
        }

        .hand-note span {
            font-size: 1.2rem;
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.2s;
            filter: drop-shadow(0 0 3px #40e0d0);
        }

        .hand-note span:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        /* decorative hand pattern inside card */
        .login-card::after {
            content: "🤟 ✌️ 👋 🖐️ 🤙";
            position: absolute;
            bottom: 12px;
            right: 20px;
            font-size: 1.8rem;
            opacity: 0.03;
            letter-spacing: 6px;
            pointer-events: none;
            z-index: -1;
            white-space: nowrap;
            transform: rotate(-3deg);
            color: #40e0d0;
            filter: drop-shadow(0 0 2px #20b2aa);
        }

        /* message area */
        .message-area {
            min-height: 1px;
            margin-bottom: 0.6rem;
        }

        .alert {
            background: rgba(0, 40, 40, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #40e0d060;
            color: #b0f0e0;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alert.success {
            background: rgba(0, 60, 50, 0.7);
            border-color: #40e0d0;
            color: #ffffff;
        }

        /* ===== LOADING ANIMATION OVERLAY (cool themed, matching admin) ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0b1f2a, #1c3a4a);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            text-align: center;
            animation: float 2.5s ease-in-out infinite;
        }

        .loader-logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #20b2aa, #40e0d0);
            color: #022028;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 700;
            margin: 0 auto 1.8rem;
            box-shadow: 
                0 15px 30px rgba(0,0,0,0.5),
                0 0 0 2px #40e0d0 inset,
                0 0 30px #20b2aa;
            border: 1px solid #a0f0e8;
            animation: pulse-glow 1.8s ease-in-out infinite;
        }

        .loader-text {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #80f0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
            font-family: 'Space Grotesk', sans-serif;
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .dot {
            width: 16px;
            height: 16px;
            background: #40e0d0;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 10px #20b2aa;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        /* animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow:
                    0 15px 30px rgba(0,0,0,0.5),
                    0 0 0 2px #40e0d0 inset,
                    0 0 30px #20b2aa;
            }
            50% {
                box-shadow:
                    0 20px 40px rgba(0,0,0,0.6),
                    0 0 0 3px #80f0e0 inset,
                    0 0 50px #40e0d0;
            }
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.6;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem 1.5rem 1.8rem;
            }
            h1 {
                font-size: 1.7rem;
            }
            .loader-logo {
                width: 90px;
                height: 90px;
                font-size: 3rem;
            }
            .loader-text {
                font-size: 1.8rem;
            }
        }
        /* Invalid Toast */
        #toast-container{
            position: fixed;
            bottom: 30px;
            left: 40.5%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Glass morphism toast */
        .toast-glass{
            display: flex;
            align-items: center;
            gap: 10px;

            padding: 12px 20px;
            border-radius: 40px;

            background: rgba(20,60,65,0.6);
            backdrop-filter: blur(10px);

            border: 1px solid rgba(64,224,208,0.6);

            color: #e0f0f0;
            font-size: 0.9rem;
            font-weight: 500;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.5),
                0 0 12px #20b2aa;

            animation: toastFadeIn 0.45s ease forwards;
        }

        /* icon */
        .toast-icon{
            color: #40e0d0;
            font-size: 1rem;
        }

        /* fade in */
        @keyframes toastFadeIn{
            from{
                opacity:0;
                transform: translateY(-15px) scale(0.95);
            }
            to{
                opacity:1;
                transform: translateY(0) scale(1);
            }
        }

        /* fade out */
        .toast-glass.fade-out{
            animation: toastFadeOut 0.45s ease forwards;
        }

        @keyframes toastFadeOut{
            from{
                opacity:1;
                transform: translateY(0) scale(1);
            }
            to{
                opacity:0;
                transform: translateY(-10px) scale(0.9);
            }
        }
    </style>
</head>
<body>
    <!-- LOADING ANIMATION OVERLAY (cool themed) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-container">
            <div class="loader-logo">⌘</div>
            <div class="loader-text">SignBridge</div>
            <div class="loader-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- LOGIN CARD – cool aesthetic with minimal sign language details -->
    <div class="login-card">
        <!-- brand strip -->
        <div class="brand">
            <div class="logo-mark">⌘</div>
            <div class="logo-text">SignBridge</div>
        </div>

        <h1>Welcome Back</h1>
        <div class="greeting">Your hands carry meaning... <br> Sign in with your credentials</div>

        <!-- message area (dynamic) -->
        <div class="message-area" id="messageArea"></div>

        <!-- FORM (django ready) -->
        <form method="post" id="loginForm">
            {% csrf_token %}

            <!-- username field -->
            <div class="input-group">
                <label for="username">email</label>
                <div class="input-field">
                    <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                    <input type="text" required id="username" name="username" placeholder="example@gmail.com" autocomplete="username">
                </div>
            </div>

            <!-- password field with eye toggle -->
            <div class="input-group">
                <label for="password">password</label>
                <div class="input-field">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" required id="password" name="password" placeholder="············" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <!-- strength indicator hidden (matching admin style) -->
                <div class="strength-container">
                    <div class="strength-track">
                        <div class="strength-fill" id="strengthFill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- forgot password -->
            <div class="action-row">
                <div class="forgot">
                    <a href="/Forgotpassword">Forgot password?</a>
                </div>
            </div>

            <!-- submit button -->
            <button type="submit" class="login-btn" id="submitBtn">
                <span>⌘</span> Sign in <span style="font-size:1rem;">🤟</span>
            </button>
        </form>

        <!-- register link -->
        <div class="register">
            New here? <a href="/user_registration">Create profile</a>
        </div>

        <!-- minimal hand gesture note -->
        <div class="hand-note">
            <span>🤟</span> <span>✌️</span> <span>👋</span> <span>🤙</span> <span>🖐️</span>
        </div>
    </div>

    <!-- Invalid Toast -->
     <div id="toast-container">
        {% if messages %}
            {% for message in messages %}
                <div class="toast-glass">
                    <i class="fa-solid fa-circle-exclamation toast-icon"></i>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- loading overlay hide script -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 600);
        });

        // simple password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (togglePassword && passwordInput && eyeIcon) {
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                eyeIcon.classList.toggle('fa-eye');
                eyeIcon.classList.toggle('fa-eye-slash');
            });
        }
    </script>
    <!-- Invalid Toast -->
     <script>
        setTimeout(function(){
            const toasts = document.querySelectorAll(".toast-glass");
            toasts.forEach(function(toast){
                toast.classList.add("fade-out");
                setTimeout(()=>{
                    toast.remove();
                },450);
            });
        },3000);
    </script>
</body>
</html>
